<title>BML Consulting — Logiciel de gestion</title>

<style>
:root{
  --blue:#1B3F8B;
  --blue-dark:#12295E;
  --blue-light:#EAF0FA;
  --green:#1E8C3A;
  --green-light:#E7F5EA;
  --yellow:#F0B90B;
  --yellow-light:#FDF3D9;
  --red:#C0392B;
  --red-light:#FBEAE8;
  --bg:#F4F6FA;
  --surface:#FFFFFF;
  --border:#E1E5EE;
  --text:#202634;
  --text-muted:#69707F;
  --radius:10px;
  --shadow:0 1px 3px rgba(20,30,60,.08);
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  font-family:'Segoe UI',Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
}
#app{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{
  width:230px;
  flex-shrink:0;
  background:var(--blue-dark);
  color:#fff;
  display:flex;
  flex-direction:column;
  padding:20px 0;
}
.sidebar .brand{
  display:flex;align-items:center;gap:10px;
  padding:0 18px 18px 18px;
  border-bottom:1px solid rgba(255,255,255,.12);
  margin-bottom:14px;
}
.sidebar .brand img{width:34px;height:34px;border-radius:6px;background:#fff;object-fit:contain;padding:2px;}
.sidebar .brand-text{line-height:1.15;}
.sidebar .brand-text b{display:block;font-size:15px;}
.sidebar .brand-text span{font-size:10px;color:#C9D4EE;letter-spacing:.03em;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 18px;
  color:#D7E0F5;
  text-decoration:none;
  cursor:pointer;
  font-size:13.5px;
  border-left:3px solid transparent;
  transition:background .12s;
}
.nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:.9;}
.nav-item:hover{background:rgba(255,255,255,.06);}
.nav-item.active{background:rgba(255,255,255,.1);border-left-color:var(--yellow);color:#fff;font-weight:600;}
.nav-sep{height:1px;background:rgba(255,255,255,.1);margin:12px 18px;}
.sidebar-footer{margin-top:auto;padding:12px 18px 0 18px;font-size:10.5px;color:#93A0C2;border-top:1px solid rgba(255,255,255,.1);padding-top:12px;}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:16px 28px;
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
}
.topbar h1{font-size:19px;margin:0;color:var(--blue-dark);}
.topbar .sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.topbar-actions{display:flex;gap:8px;flex-wrap:wrap;}
.content{padding:22px 28px 60px 28px;flex:1;}

/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;
  border-radius:7px;border:1px solid transparent;
  font-size:13px;font-weight:600;cursor:pointer;
  background:var(--surface);color:var(--text);
  border:1px solid var(--border);
}
.btn:hover{filter:brightness(0.97);}
.btn svg{width:14px;height:14px;}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-primary:hover{background:var(--blue-dark);}
.btn-green{background:var(--green);color:#fff;border-color:var(--green);}
.btn-yellow{background:var(--yellow);color:#3a2e00;border-color:var(--yellow);}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red);}
.btn-ghost{background:transparent;border-color:transparent;color:var(--blue);}
.btn-sm{padding:5px 9px;font-size:12px;border-radius:6px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* CARDS / GRID */
.grid{display:grid;gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media (max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);}}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);
}
.kpi .label{font-size:11.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600;}
.kpi .value{font-size:24px;font-weight:700;color:var(--blue-dark);margin-top:6px;}
.kpi .value.green{color:var(--green);}
.kpi .value.red{color:var(--red);}
.kpi .foot{font-size:11.5px;color:var(--text-muted);margin-top:4px;}

.section-title{font-size:14.5px;font-weight:700;color:var(--blue-dark);margin:26px 0 10px 0;display:flex;align-items:center;justify-content:space-between;}

/* TABLES */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{
  background:var(--blue-light);color:var(--blue-dark);
  text-align:left;padding:10px 12px;font-size:11.5px;
  text-transform:uppercase;letter-spacing:.03em;font-weight:700;
  border-bottom:1px solid var(--border);
}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:#FAFBFE;}
.empty-row td{text-align:center;color:var(--text-muted);padding:34px;font-style:italic;}
.num{text-align:right;font-variant-numeric:tabular-nums;}
.actions-cell{white-space:nowrap;text-align:right;}
.actions-cell .btn{margin-left:4px;}

/* BADGES */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.02em;}
.badge-blue{background:var(--blue-light);color:var(--blue);}
.badge-green{background:var(--green-light);color:var(--green);}
.badge-yellow{background:var(--yellow-light);color:#8a6b00;}
.badge-red{background:var(--red-light);color:var(--red);}
.badge-grey{background:#EEF0F4;color:#5b6270;}

/* FORMS */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow);}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.form-grid.cols-2{grid-template-columns:repeat(2,1fr);}
.form-grid.cols-4{grid-template-columns:repeat(4,1fr);}
@media (max-width:900px){.form-grid,.form-grid.cols-2,.form-grid.cols-4{grid-template-columns:1fr;}}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;
  font-size:13.5px;font-family:inherit;background:#fff;color:var(--text);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--blue);outline-offset:0;border-color:var(--blue);}
.field textarea{resize:vertical;min-height:56px;}
.form-section{margin-bottom:20px;}
.form-section h3{font-size:13px;color:var(--blue-dark);margin:0 0 12px 0;border-bottom:1px dashed var(--border);padding-bottom:6px;}

.lines-table{width:100%;border-collapse:collapse;margin-bottom:10px;}
.lines-table th{background:var(--blue-light);color:var(--blue-dark);font-size:11px;text-transform:uppercase;padding:7px 8px;text-align:left;}
.lines-table td{padding:6px 6px;border-bottom:1px solid var(--border);}
.lines-table input{width:100%;border:1px solid var(--border);border-radius:5px;padding:6px 7px;font-size:13px;}
.lines-table .amount-cell{text-align:right;font-weight:600;white-space:nowrap;padding-right:10px;}
.lines-table .del-line{color:var(--red);cursor:pointer;background:none;border:none;font-size:16px;}

.totals-box{margin-left:auto;width:320px;background:var(--blue-light);border-radius:8px;padding:14px 16px;}
.totals-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;}
.totals-row.grand{font-weight:800;font-size:15.5px;color:var(--blue-dark);border-top:1px solid #C6D3EF;margin-top:6px;padding-top:8px;}
.totals-row .lbl{color:var(--text-muted);}

.form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;border-top:1px solid var(--border);padding-top:16px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,20,35,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal-box{background:#fff;border-radius:12px;max-width:480px;width:100%;padding:24px;box-shadow:0 12px 40px rgba(0,0,0,.25);}
.modal-box h3{margin:0 0 10px 0;color:var(--blue-dark);font-size:16px;}
.modal-box p{margin:0 0 18px 0;font-size:13.5px;color:var(--text-muted);line-height:1.5;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;}

/* TOAST */
#toast-wrap{position:fixed;top:18px;right:18px;z-index:300;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--blue-dark);color:#fff;padding:11px 16px;border-radius:8px;font-size:13px;box-shadow:0 6px 18px rgba(0,0,0,.2);animation:slideIn .18s ease-out;max-width:320px;}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
@keyframes slideIn{from{transform:translateX(30px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* MISC */
.pill-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;width:fit-content;}
.pill-toggle button{border:none;background:#fff;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-muted);}
.pill-toggle button.active.enc{background:var(--green);color:#fff;}
.pill-toggle button.active.dec{background:var(--red);color:#fff;}
.filters-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px;}
.filters-bar .field{min-width:160px;}
.help-text{font-size:12px;color:var(--text-muted);margin:6px 0 0 0;line-height:1.5;}
.tag-list{display:flex;flex-wrap:wrap;gap:8px;}
.tag{background:var(--blue-light);color:var(--blue-dark);padding:6px 10px;border-radius:7px;font-size:12.5px;display:flex;align-items:center;gap:8px;}
.tag button{border:none;background:none;color:var(--red);cursor:pointer;font-weight:700;}
.link{color:var(--blue);cursor:pointer;text-decoration:underline;font-weight:600;}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted);}
.empty-state svg{width:48px;height:48px;opacity:.35;margin-bottom:10px;}
.progress-bar{height:7px;background:#E7EBF3;border-radius:6px;overflow:hidden;}
.progress-bar > div{height:100%;background:var(--green);}

</style>
</head>

let fbApp, fbSecondaryApp, db, auth, secondaryAuth;
let unsubscribers = [];

function firebaseReady() {
  return FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== 'VOTRE_API_KEY';
}

function initFirebase() {
  if (!firebaseReady()) return;
  fbApp = firebase.initializeApp(FIREBASE_CONFIG);
  fbSecondaryApp = firebase.initializeApp(FIREBASE_CONFIG, 'Secondary');
  db = firebase.firestore();
  auth = firebase.auth();
  secondaryAuth = fbSecondaryApp.auth();
  auth.onAuthStateChanged(onAuthChanged);
}

async function onAuthChanged(fbUser) {
  if (!fbUser) {
    detachListeners();
    STATE.currentUser = null;
    STATE.devis = []; STATE.factures = []; STATE.caisse = [];
    render();
    return;
  }
  try {
    const snap = await db.collection('users').doc(fbUser.uid).get();
    if (!snap.exists || snap.data().actif === false) {
      STATE.loginError = 'Ce compte n\'a pas (ou plus) accès au logiciel. Contactez votre administrateur.';
      await auth.signOut();
      return;
    }
    const profil = snap.data();
    STATE.currentUser = { id: fbUser.uid, email: fbUser.email, nom: profil.nom, role: profil.role };
    STATE.loginError = null;
    STATE.route = 'dashboard';
    attachListeners();
    render();
  } catch (e) {
    STATE.loginError = 'Erreur de connexion : ' + e.message;
    render();
  }
}

function translateFirebaseError(e) {
  const map = {
    'auth/invalid-email': 'Adresse e-mail invalide.',
    'auth/user-not-found': 'Aucun compte avec cette adresse e-mail.',
    'auth/wrong-password': 'Mot de passe incorrect.',
    'auth/invalid-credential': 'Identifiant ou mot de passe incorrect.',
    'auth/email-already-in-use': 'Cette adresse e-mail est déjà utilisée par un autre compte.',
    'auth/weak-password': 'Le mot de passe doit contenir au moins 6 caractères.',
    'auth/network-request-failed': 'Problème de connexion réseau.',
  };
  return map[e.code] || e.message;
}

/* Abonnements temps réel : chaque modification faite par un collaborateur
   (sur un autre ordinateur) met à jour STATE et rafraîchit l'écran automatiquement. */
function subscribeCollection(name, stateKey) {
  const unsub = db.collection(name).onSnapshot(qs => {
    const arr = [];
    qs.forEach(doc => arr.push(doc.data()));
    STATE[stateKey] = arr;
    if (!FORM_ROUTES.includes(STATE.route)) render();
  }, err => toast('Synchronisation ' + name + ' : ' + err.message, 'error'));
  unsubscribers.push(unsub);
}
function subscribeDoc(path, onData) {
  const unsub = db.doc(path).onSnapshot(doc => {
    onData(doc.exists ? doc.data() : null);
    if (!FORM_ROUTES.includes(STATE.route)) render();
  }, err => toast('Synchronisation ' + path + ' : ' + err.message, 'error'));
  unsubscribers.push(unsub);
}
function attachListeners() {
  detachListeners();
  subscribeDoc('settings/general', data => { if (data) STATE.params = data; });
  subscribeDoc('settings/comptes', data => { if (data && data.list) STATE.comptes = data.list; });
  subscribeCollection('devis', 'devis');
  subscribeCollection('factures', 'factures');
  subscribeCollection('caisse', 'caisse');
  if (STATE.currentUser && STATE.currentUser.role === 'Administrateur') subscribeCollection('users', 'users');
}
function detachListeners() {
  unsubscribers.forEach(u => { try { u(); } catch (e) {} });
  unsubscribers = [];
}

/* Écritures vers Firestore (remplace l'ancien "persist" en stockage local) */
function fsSaveDoc(col, obj) {
  return db.collection(col).doc(obj.id).set(obj).catch(e => toast('Erreur d\'enregistrement : ' + e.message, 'error'));
}
function fsDeleteDoc(col, id) {
  return db.collection(col).doc(id).delete().catch(e => toast('Erreur de suppression : ' + e.message, 'error'));
}
function fsSaveSettings(name, obj) {
  return db.collection('settings').doc(name).set(obj).catch(e => toast('Erreur d\'enregistrement : ' + e.message, 'error'));
}

/* ==================== UTILITAIRES ==================== */
function uid() { return 'id' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function todayISO() { return new Date().toISOString().slice(0, 10); }

function formatDate(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function formatMoney(n) {
  n = Math.round(Number(n) || 0);
  return n.toLocaleString('fr-FR').replace(/\u202f/g, ' ') + ' ' + STATE.params.devise;
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function generateNumero(list) {
  const d = new Date();
  const yy = String(d.getFullYear()).slice(-2);
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const datePart = yy + mm + dd;
  const todays = list.filter(x => x.numero && x.numero.startsWith(datePart));
  const seq = String(todays.length + 1).padStart(3, '0');
  return datePart + '-' + seq;
}

function calcTotauxDoc(doc) {
  const ht = (doc.lignes || []).reduce((s, l) => s + (Number(l.pu) || 0) * (Number(l.qte) || 0), 0);
  const remisePct = Number(doc.remisePct) || 0;
  const remiseMontant = ht * remisePct / 100;
  const base = ht - remiseMontant;
  const tps = base * (Number(STATE.params.tauxTPS) || 0) / 100;
  const css = base * (Number(STATE.params.tauxCSS) || 0) / 100;
  const ttc = base + tps + css;
  return { ht, remiseMontant, base, tps, css, ttc };
}

function compteSoldeActuel(compteId, uptoDate) {
  const compte = STATE.comptes.find(c => c.id === compteId);
  if (!compte) return 0;
  let solde = Number(compte.soldeInitial) || 0;
  STATE.caisse.forEach(p => {
    if (p.compte !== compteId) return;
    if (uptoDate && p.date > uptoDate) return;
    solde += p.sens === 'ENC' ? Number(p.montant) : -Number(p.montant);
  });
  return solde;
}

function factureMontantPaye(factureId) {
  return STATE.caisse
    .filter(p => p.factureId === factureId && p.sens === 'ENC')
    .reduce((s, p) => s + Number(p.montant), 0);
}

function factureStatut(f) {
  if (f.statutManuel === 'Annulée') return 'Annulée';
  const { ttc } = calcTotauxDoc(f);
  const paye = factureMontantPaye(f.id);
  if (paye >= ttc && ttc > 0) return 'Payée';
  if (paye > 0) return 'Partielle';
  if (f.echeance && f.echeance < todayISO()) return 'En retard';
  return 'Émise';
}

function statutBadgeClass(statut) {
  return {

    'Refusé': 'badge-red', 'Expiré': 'badge-grey', 'Converti': 'badge-blue',
    'Émise': 'badge-blue', 'Partielle': 'badge-yellow', 'Payée': 'badge-green',
    'En retard': 'badge-red', 'Annulée': 'badge-grey',
  }[statut] || 'badge-grey';
}

function montantEnLettres(n) {
  n = Math.round(Number(n) || 0);
  if (n === 0) return 'zéro franc CFA';
  const unites = ['', 'un', 'deux', 'trois', 'quatre', 'cinq', 'six', 'sept', 'huit', 'neuf', 'dix',
    'onze', 'douze', 'treize', 'quatorze', 'quinze', 'seize', 'dix-sept', 'dix-huit', 'dix-neuf'];
  const dizaines = ['', '', 'vingt', 'trente', 'quarante', 'cinquante', 'soixante', 'soixante', 'quatre-vingt', 'quatre-vingt'];
  function convertGroupe(num) {
    let res = '';
    const c = Math.floor(num / 100), r = num % 100;
    if (c > 0) res += (c > 1 ? unites[c] + ' cent' : 'cent') + (r === 0 && c > 1 ? 's' : '') + (r > 0 ? ' ' : '');
    if (r > 0) {
      if (r < 20) res += unites[r];
      else {
        const dz = Math.floor(r / 10), u = r % 10;
        if (dz === 7 || dz === 9) {
          res += dizaines[dz] + (u === 0 ? '' : (u === 1 ? ' et ' : '-') + unites[10 + u]);
        } else {
          res += dizaines[dz] + (u === 0 ? (dz === 8 ? 's' : '') : (u === 1 && dz !== 8 ? ' et ' : '-') + unites[u]);
        }
      }
    }
    return res.trim();
  }
  const tranches = [
    { val: 1000000000, mot: 'milliard' },
    { val: 1000000, mot: 'million' },
    { val: 1000, mot: 'mille' },
  ];
  let reste = n, parts = [];
  for (const t of tranches) {
    const q = Math.floor(reste / t.val);
    if (q > 0) {
      if (t.val === 1000 && q === 1) parts.push('mille');
      else parts.push(convertGroupe(q) + ' ' + t.mot + (q > 1 && t.mot !== 'mille' ? 's' : ''));
      reste %= t.val;
    }
  }
  if (reste > 0) parts.push(convertGroupe(reste));
  let phrase = parts.join(' ');
  phrase = phrase.charAt(0).toUpperCase() + phrase.slice(1);
  return phrase + ' francs CFA';
}

function toast(msg, type = 'info') {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3600);
}

function pdfLinesAndTotals(doc, item, startY) {
  const rows = (item.lignes || []).map(l => [
    l.ref || '', l.description || '',
    formatMoney(l.pu), l.qte,
    formatMoney((Number(l.pu) || 0) * (Number(l.qte) || 0)),
  ]);
  doc.autoTable({
    startY,
    head: [['Référence', 'Désignation', 'PU HT', 'Qté', 'Montant HT']],
    body: rows,
    theme: 'grid',
    headStyles: { fillColor: [27, 63, 139], textColor: 255, fontSize: 9 },
    styles: { fontSize: 9, cellPadding: 3 },
    columnStyles: { 2: { halign: 'right' }, 3: { halign: 'right' }, 4: { halign: 'right' } },
    margin: { left: 15, right: 15 },
  });
  const t = calcTotauxDoc(item);
  let y = doc.lastAutoTable.finalY + 8;
  const lines = [
    ['Total HT', formatMoney(t.ht)],
    ['Remise (' + (item.remisePct || 0) + '%)', '- ' + formatMoney(t.remiseMontant)],
    ['TPS (' + STATE.params.tauxTPS + '%)', formatMoney(t.tps)],
    ['CSS (' + STATE.params.tauxCSS + '%)', formatMoney(t.css)],
  ];
  doc.setFontSize(9.5); doc.setTextColor(60, 60, 60);
  lines.forEach((row, i) => {
    doc.setFont('helvetica', 'normal');
    doc.text(row[0], 130, y + i * 6);
    doc.text(row[1], 195, y + i * 6, { align: 'right' });
  });
  y += lines.length * 6 + 3;
  doc.setDrawColor(200, 200, 200); doc.line(130, y - 4, 195, y - 4);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(11.5); doc.setTextColor(27, 63, 139);
  doc.text('TOTAL TTC', 130, y + 2);
  doc.text(formatMoney(t.ttc), 195, y + 2, { align: 'right' });
  return y + 12;
}

function moisSummary(compteId, mois) {
  const compte = STATE.comptes.find(c => c.id === compteId) || { soldeInitial: 0 };
  let before = Number(compte.soldeInitial) || 0, enc = 0, dec = 0;
  STATE.caisse.forEach(p => {
    if (p.compte !== compteId) return;
    const m = p.date.slice(0, 7);
    if (mois && m === mois) {
      if (p.sens === 'ENC') enc += Number(p.montant); else dec += Number(p.montant);
    } else if (!mois || m < mois) {
      before += p.sens === 'ENC' ? Number(p.montant) : -Number(p.montant);
    }
  });
  return { soldeInitial: before, enc, dec, soldeFinal: before + enc - dec };
}

    headStyles: { fillColor: [27, 63, 139], textColor: 255, fontSize: 9 },
    styles: { fontSize: 9, cellPadding: 3 },
    columnStyles: { 1: { halign: 'right' }, 2: { halign: 'right' }, 3: { halign: 'right' }, 4: { halign: 'right' } },
    didParseCell: (data) => { if (data.row.index === rows.length) data.cell.styles.fontStyle = 'bold'; },
    margin: { left: 15, right: 15 },
  });

  let journal = STATE.caisse.slice().sort((a, b) => a.date < b.date ? 1 : -1);
  if (mois) journal = journal.filter(p => p.date.slice(0, 7) === mois);
  const jRows = journal.map(p => [
    formatDate(p.date), p.numero, p.sens === 'ENC' ? 'Encaissement' : 'Decaissement',
    p.nom || '', (STATE.comptes.find(c => c.id === p.compte) || {}).nom || '',
    p.sens === 'ENC' ? formatMoney(p.montant) : '', p.sens === 'DEC' ? formatMoney(p.montant) : '',
  ]);
  doc.autoTable({
    startY: doc.lastAutoTable.finalY + 10,
    head: [['Date', 'N°', 'Sens', 'Tiers', 'Compte', 'Encaissement', 'Decaissement']],
    body: jRows.length ? jRows : [['—', '—', 'Aucune operation sur la periode', '', '', '', '']],
    theme: 'striped',
    headStyles: { fillColor: [30, 140, 58], textColor: 255, fontSize: 8.5 },
    styles: { fontSize: 8.5, cellPadding: 2.5 },
    columnStyles: { 5: { halign: 'right' }, 6: { halign: 'right' } },
    margin: { left: 15, right: 15 },
  });
  doc.save('Etat_Tresorerie_' + (mois || 'global') + '.pdf');
}

</script>
<script>
/* ==================== ROUTER & RENDER ==================== */
function navigate(route, param) {
  if (!canAccess(route)) {
    toast('Votre profil (' + (STATE.currentUser ? STATE.currentUser.role : '') + ') n\'a pas accès à cette section.', 'error');
    return;
  }
  STATE.route = route;
  STATE.routeParam = param || null;
  window.scrollTo(0, 0);
  render();
}

function render() {
  const app = document.getElementById('app');
  if (!STATE.currentUser) {
    app.innerHTML = renderLogin();
    renderModals();
    return;
  }
  if (!canAccess(STATE.route)) STATE.route = 'dashboard';
  app.innerHTML = sidebarHTML() + mainHTML();
  renderModals();
}

/* ==================== AUTHENTIFICATION ==================== */
function renderLogin() {
  if (!firebaseReady()) {
    return `
    <div style="min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--blue-dark),var(--blue));padding:20px;">
      <div style="background:#fff;border-radius:14px;padding:32px;width:100%;max-width:460px;box-shadow:0 20px 50px rgba(0,0,0,.3);">
        <h2 style="color:var(--blue-dark);margin-top:0;">Configuration requise</h2>
        <p style="color:var(--text-muted);font-size:13.5px;line-height:1.6;">
          Ce logiciel doit être relié à votre projet Firebase avant utilisation.
          Renseignez vos clés dans la constante <code>FIREBASE_CONFIG</code> en haut du fichier,
          puis rechargez la page. Suivez le guide de mise en service fourni séparément.
        </p>
      </div>
    </div>`;
  }
  return `
  <div style="min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--blue-dark),var(--blue));">
    <div style="background:#fff;border-radius:14px;padding:36px 34px;width:100%;max-width:380px;box-shadow:0 20px 50px rgba(0,0,0,.3);">
      <div style="text-align:center;margin-bottom:18px;">
        <img src="data:image/jpeg;base64,${window.LOGO_B64}" style="width:56px;height:56px;border-radius:10px;"/>
        <h2 style="color:var(--blue-dark);margin:12px 0 2px 0;">BML Consulting</h2>
        <div style="color:var(--text-muted);font-size:12.5px;">Connexion au logiciel de gestion</div>
      </div>
      ${STATE.loginError ? `<div style="background:var(--red-light);color:var(--red);padding:8px 12px;border-radius:7px;font-size:12.5px;margin-bottom:14px;">${escapeHtml(STATE.loginError)}</div>` : ''}
      <div class="field" style="margin-bottom:12px;"><label>Adresse e-mail</label><input id="login-id" type="email" value="${escapeHtml(STATE.loginId || '')}" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <div class="field" style="margin-bottom:18px;"><label>Mot de passe</label><input id="login-pw" type="password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="doLogin()">${ICONS.lock} Se connecter</button>
      <p class="help-text" style="text-align:center;margin-top:16px;">Vos données sont synchronisées en temps réel avec tous vos collaborateurs, où qu'ils se trouvent.</p>
    </div>
  </div>`;
}
function doLogin() {
  const email = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  if (!email || !pw) { STATE.loginError = 'Veuillez renseigner votre e-mail et votre mot de passe.'; render(); return; }
  STATE.loginId = email;
  auth.signInWithEmailAndPassword(email, pw).catch(e => {
    STATE.loginError = translateFirebaseError(e);
    render();
  });
}
function doLogout() {
  auth.signOut();
}

function sidebarHTML() {
  const items = [
    ['dashboard', 'Tableau de bord', ICONS.dashboard],
    ['devis-list', 'Devis', ICONS.devis],
    ['factures-list', 'Factures', ICONS.facture],
    ['caisse-list', 'Caisse', ICONS.caisse],
    ['tresorerie', 'Trésorerie', ICONS.treso],
    ['utilisateurs', 'Utilisateurs', ICONS.users],
    ['parametres', 'Paramètres', ICONS.params],
  ].filter(([r]) => canAccess(r));
  const activeGroup = routeGroup(STATE.route);
  const u = STATE.currentUser || {};
  return `
  <div class="sidebar">
    <div class="brand">
      <img src="data:image/jpeg;base64,${window.LOGO_B64}" alt="BML"/>
      <div class="brand-text"><b>BML Consulting</b><span>Gestion &amp; Trésorerie</span></div>
    </div>
    <nav>
      ${items.map(([r, label, icon]) => `
        <a class="nav-item ${activeGroup === r ? 'active' : ''}" onclick="navigate('${r}')">${icon}<span>${label}</span></a>
      `).join('')}
    </nav>
    <div class="sidebar-footer">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px;">
        <div style="min-width:0;">
          <div style="color:#fff;font-weight:700;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(u.nom || '')}</div>
          <div style="font-size:10.5px;">${escapeHtml(u.role || '')}</div>
        </div>
        <a onclick="doLogout()" title="Se déconnecter" style="cursor:pointer;color:#D7E0F5;flex-shrink:0;width:17px;height:17px;display:inline-block;">${ICONS.logout}</a>
      </div>
      Logiciel de gestion interne<br/>v1.0 — Synchronisation en temps réel
    </div>
  </div>`;
}

function mainHTML() {
  let title = '', sub = '', actions = '', content = '';
  switch (STATE.route) {
    case 'dashboard':
      title = 'Tableau de bord'; sub = 'Vue d\'ensemble de l\'activité';
      content = renderDashboard(); break;
    case 'devis-list':
      title = 'Devis'; sub = 'Création et suivi des devis clients';
      actions = canEdit('devis') ? `<button class="btn btn-primary" onclick="newDevisForm()">${ICONS.plus} Nouveau devis</button>` : '';
      content = renderDevisList(); break;
    case 'devis-form':
      title = STATE.formDraft && STATE.formDraft._isNew ? 'Nouveau devis' : 'Modifier le devis';
      sub = 'N° ' + (STATE.formDraft ? STATE.formDraft.numero : '');
      content = renderDevisForm(); break;
    case 'factures-list':
      title = 'Factures'; sub = 'Émission et suivi des règlements clients';
      actions = canEdit('factures') ? `<button class="btn btn-primary" onclick="newFactureForm()">${ICONS.plus} Nouvelle facture</button>` : '';
      content = renderFacturesList(); break;
    case 'facture-form':
      title = STATE.formDraft && STATE.formDraft._isNew ? 'Nouvelle facture' : 'Modifier la facture';
      sub = 'N° ' + (STATE.formDraft ? STATE.formDraft.numero : '');
      content = renderFactureForm(); break;
    case 'caisse-list':
      title = 'Caisse'; sub = 'Pièces d\'encaissement et de décaissement';
      actions = canEdit('caisse') ? `<button class="btn btn-green" onclick="newCaisseForm('ENC')">${ICONS.plus} Encaissement</button>
                 <button class="btn btn-danger" onclick="newCaisseForm('DEC')">${ICONS.plus} Décaissement</button>` : '';
      content = renderCaisseList(); break;
    case 'caisse-form':
      title = STATE.formDraft && STATE.formDraft._isNew ? 'Nouvelle pièce de caisse' : 'Modifier la pièce de caisse';
      sub = 'N° ' + (STATE.formDraft ? STATE.formDraft.numero : '');
      content = renderCaisseForm(); break;
    case 'tresorerie':
      title = 'Trésorerie globale'; sub = 'Suivi consolidé des comptes et moyens de paiement';
      content = renderTresorerie(); break;
    case 'utilisateurs':
      title = 'Utilisateurs'; sub = 'Gestion des comptes et des droits d\'accès';
      actions = `<button class="btn btn-primary" onclick="newUtilisateurForm()">${ICONS.plus} Nouvel utilisateur</button>`;
      content = renderUtilisateurs(); break;
    case 'utilisateur-form':
      title = STATE.formDraft && STATE.formDraft._isNew ? 'Nouvel utilisateur' : 'Modifier l\'utilisateur';
      sub = STATE.formDraft ? STATE.formDraft.identifiant : '';
      content = renderUtilisateurForm(); break;
    case 'parametres':
      title = 'Paramètres'; sub = 'Informations légales, taux fiscaux et comptes';
      content = renderParametres(); break;
    default:
      content = '<p>Page introuvable.</p>';
  }
  return `
  <div class="main">
    <div class="topbar">
      <div><h1>${title}</h1><div class="sub">${sub}</div></div>
      <div class="topbar-actions">${syncStatusHTML()}${actions}</div>
    </div>
    <div class="content">${content}</div>
  </div>`;
}

/* ==================== DASHBOARD ==================== */
function renderDashboard() {
  const soldeGlobal = STATE.comptes.reduce((s, c) => s + compteSoldeActuel(c.id), 0);
  const impayees = STATE.factures.filter(f => ['Émise', 'Partielle', 'En retard'].includes(factureStatut(f)));
  const totalImpaye = impayees.reduce((s, f) => s + (calcTotauxDoc(f).ttc - factureMontantPaye(f.id)), 0);
  const curMonth = todayISO().slice(0, 7);
  const ventesMois = STATE.factures.filter(f => f.date && f.date.slice(0, 7) === curMonth && f.statutManuel !== 'Annulée')
    .reduce((s, f) => s + calcTotauxDoc(f).ttc, 0);
  const encMois = STATE.caisse.filter(p => p.date.slice(0, 7) === curMonth && p.sens === 'ENC').reduce((s, p) => s + Number(p.montant), 0);
  const decMois = STATE.caisse.filter(p => p.date.slice(0, 7) === curMonth && p.sens === 'DEC').reduce((s, p) => s + Number(p.montant), 0);

  const recentCaisse = STATE.caisse.slice().sort((a, b) => (b.date + b.numero).localeCompare(a.date + a.numero)).slice(0, 6);
  const recentFactures = STATE.factures.slice().sort((a, b) => (b.date + b.numero).localeCompare(a.date + a.numero)).slice(0, 6);

  const treso = canViewTreso();
  const kpis = [];
  if (treso) kpis.push(`<div class="card kpi"><div class="label">Solde global de trésorerie</div><div class="value">${formatMoney(soldeGlobal)}</div><div class="foot">Tous comptes confondus</div></div>`);
  kpis.push(`<div class="card kpi"><div class="label">Factures impayées</div><div class="value red">${formatMoney(totalImpaye)}</div><div class="foot">${impayees.length} facture(s) en attente</div></div>`);
  kpis.push(`<div class="card kpi"><div class="label">Ventes du mois</div><div class="value green">${formatMoney(ventesMois)}</div><div class="foot">Factures émises en ${curMonth}</div></div>`);
  if (treso) kpis.push(`<div class="card kpi"><div class="label">Flux du mois</div><div class="value">${formatMoney(encMois - decMois)}</div><div class="foot">Enc. ${formatMoney(encMois)} — Déc. ${formatMoney(decMois)}</div></div>`);

  return `
  <div class="grid grid-4">
    ${kpis.join('')}
  </div>

  ${treso ? `
  <div class="section-title">Comptes de trésorerie</div>
  <div class="grid grid-3">
    ${STATE.comptes.map(c => `
      <div class="card">
        <div class="label" style="font-size:11.5px;color:var(--text-muted);text-transform:uppercase;font-weight:600;">${escapeHtml(c.nom)}</div>
        <div style="font-size:19px;font-weight:700;color:var(--blue-dark);margin-top:6px;">${formatMoney(compteSoldeActuel(c.id))}</div>
        <div class="foot" style="font-size:11.5px;color:var(--text-muted);margin-top:2px;">${escapeHtml(c.type || '')}</div>
      </div>
    `).join('')}
  </div>` : ''}

  <div class="grid grid-2" style="margin-top:26px;">
    ${treso ? `
    <div>
      <div class="section-title">Dernières opérations de caisse</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Date</th><th>Sens</th><th>Tiers</th><th class="num">Montant</th></tr></thead>
        <tbody>
        ${recentCaisse.length === 0 ? `<tr class="empty-row"><td colspan="4">Aucune opération enregistrée</td></tr>` :
          recentCaisse.map(p => `<tr>
            <td>${formatDate(p.date)}</td>
            <td><span class="badge ${p.sens === 'ENC' ? 'badge-green' : 'badge-red'}">${p.sens === 'ENC' ? 'Encaissement' : 'Décaissement'}</span></td>
            <td>${escapeHtml(p.nom || '—')}</td>
            <td class="num">${formatMoney(p.montant)}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>` : ''}
    <div>
      <div class="section-title">Dernières factures</div>
      <div class="table-wrap"><table>
        <thead><tr><th>N°</th><th>Client</th><th class="num">TTC</th><th>Statut</th></tr></thead>
        <tbody>
        ${recentFactures.length === 0 ? `<tr class="empty-row"><td colspan="4">Aucune facture enregistrée</td></tr>` :
          recentFactures.map(f => `<tr>
            <td>${f.numero}</td>
            <td>${escapeHtml(f.client.nom)}</td>
            <td class="num">${formatMoney(calcTotauxDoc(f).ttc)}</td>
            <td><span class="badge ${statutBadgeClass(factureStatut(f))}">${factureStatut(f)}</span></td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>
  </div>`;
}

/* ==================== DEVIS ==================== */
function newDevisForm() {
  STATE.formDraft = {
    id: uid(), _isNew: true, numero: generateNumero(STATE.devis), date: todayISO(), dateValidite: '',
    client: { nom: '', adresse: '', telephone: '' },
    lignes: [{ id: uid(), ref: '', description: '', pu: 0, qte: 1 }],
    remisePct: 0, statut: 'Brouillon',
  };
  navigate('devis-form');
}
function editDevisForm(id) {
  const d = STATE.devis.find(x => x.id === id);
  if (!d) return;
  STATE.formDraft = JSON.parse(JSON.stringify(d));
  STATE.formDraft._isNew = false;
  navigate('devis-form');
}
function saveDevis() {
  const d = STATE.formDraft;
  if (!d.client.nom.trim()) { toast('Veuillez indiquer le nom du client.', 'error'); return; }
  if (!d.lignes.length) { toast('Ajoutez au moins une ligne au devis.', 'error'); return; }
  const clean = JSON.parse(JSON.stringify(d)); delete clean._isNew;
  fsSaveDoc('devis', clean);
  toast('Devis ' + clean.numero + ' enregistré.', 'success');
  navigate('devis-list');
}
function deleteDevis(id) {
  askConfirm('Supprimer ce devis ?', 'Cette action est définitive et ne peut pas être annulée.', () => {
    fsDeleteDoc('devis', id); STATE.confirmModal = null; toast('Devis supprimé.', 'success'); render();
  });
}
function convertirDevis(id) {
  const d = STATE.devis.find(x => x.id === id);
  if (!d) return;
  const f = {
    id: uid(), numero: generateNumero(STATE.factures), date: todayISO(), echeance: '',
    client: JSON.parse(JSON.stringify(d.client)), lignes: JSON.parse(JSON.stringify(d.lignes)),
    remisePct: d.remisePct, reglement: 'Espèces', statutManuel: null, motPasse: '', devisId: d.id,
  };
  const dUpdated = JSON.parse(JSON.stringify(d));
  dUpdated.statut = 'Converti'; dUpdated.factureId = f.id;
  fsSaveDoc('factures', f);
  fsSaveDoc('devis', dUpdated);
  toast('Devis converti en facture ' + f.numero + '.', 'success');
  navigate('factures-list');
}
function renderDevisList() {
  const rows = STATE.devis.slice().sort((a, b) => (b.date + b.numero).localeCompare(a.date + a.numero));
  return `
  <div class="table-wrap"><table>
    <thead><tr><th>N°</th><th>Date</th><th>Client</th><th class="num">Total TTC</th><th>Validité</th><th>Statut</th><th></th></tr></thead>
    <tbody>
    ${rows.length === 0 ? `<tr class="empty-row"><td colspan="7">Aucun devis pour le moment. Cliquez sur « Nouveau devis » pour commencer.</td></tr>` :
      rows.map(d => `<tr>
        <td>${d.numero}</td>
        <td>${formatDate(d.date)}</td>
        <td>${escapeHtml(d.client.nom)}</td>
        <td class="num">${formatMoney(calcTotauxDoc(d).ttc)}</td>
        <td>${formatDate(d.dateValidite)}</td>
        <td><span class="badge ${statutBadgeClass(d.statut)}">${d.statut}</span></td>
        <td class="actions-cell">
          <button class="btn btn-sm btn-ghost" title="PDF" onclick="genererDevisPDF(STATE.devis.find(x=>x.id==='${d.id}'))">${ICONS.pdf}</button>
          ${canEdit('devis') ? `${d.statut !== 'Converti' ? `<button class="btn btn-sm btn-green" onclick="convertirDevis('${d.id}')">Convertir</button>` : ''}
          <button class="btn btn-sm btn-ghost" title="Modifier" onclick="editDevisForm('${d.id}')">${ICONS.edit}</button>
          <button class="btn btn-sm btn-ghost" title="Supprimer" onclick="deleteDevis('${d.id}')">${ICONS.trash}</button>` : ''}
        </td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}
function renderDevisForm() {
  return docFormHTML(STATE.formDraft, 'devis');
}

/* ==================== FACTURES ==================== */
function newFactureForm() {
  const d = new Date(); d.setDate(d.getDate() + 30);
  STATE.formDraft = {
    id: uid(), _isNew: true, numero: generateNumero(STATE.factures), date: todayISO(), echeance: d.toISOString().slice(0, 10),
    client: { nom: '', adresse: '', telephone: '' },
    lignes: [{ id: uid(), ref: '', description: '', pu: 0, qte: 1 }],
    remisePct: 0, reglement: 'Espèces', statutManuel: null, motPasse: '',
  };
  navigate('facture-form');
}
function editFactureForm(id) {
  const f = STATE.factures.find(x => x.id === id);
  if (!f) return;
  STATE.formDraft = JSON.parse(JSON.stringify(f));
  STATE.formDraft._isNew = false;
  navigate('facture-form');
}
function saveFacture() {
  const f = STATE.formDraft;
  if (!f.client.nom.trim()) { toast('Veuillez indiquer le nom du client.', 'error'); return; }
  if (!f.lignes.length) { toast('Ajoutez au moins une ligne à la facture.', 'error'); return; }
  const clean = JSON.parse(JSON.stringify(f)); delete clean._isNew;
  fsSaveDoc('factures', clean);
  toast('Facture ' + clean.numero + ' enregistrée.', 'success');
  navigate('factures-list');
}
function deleteFacture(id) {
  askConfirm('Supprimer cette facture ?', 'Les pièces de caisse liées ne seront pas supprimées mais perdront leur lien.', () => {
    fsDeleteDoc('factures', id); STATE.confirmModal = null; toast('Facture supprimée.', 'success'); render();
  });
}
function annulerFacture(id) {
  const f = STATE.factures.find(x => x.id === id);
  askConfirm('Annuler cette facture ?', 'La facture ' + f.numero + ' sera marquée comme annulée.', () => {
    const clean = JSON.parse(JSON.stringify(f)); clean.statutManuel = 'Annulée';
    fsSaveDoc('factures', clean); STATE.confirmModal = null; toast('Facture annulée.', 'success'); render();
  });
}
function ouvrirEncaisser(factureId) {
  const f = STATE.factures.find(x => x.id === factureId);
  const t = calcTotauxDoc(f);
  const reste = Math.max(0, t.ttc - factureMontantPaye(factureId));
  STATE.encaisserModal = { factureId, montant: reste, date: todayISO(), compte: STATE.comptes[0].id, nom: f.client.nom };
  render();
}
function confirmerEncaisser() {
  const m = STATE.encaisserModal;
  if (!m.montant || Number(m.montant) <= 0) { toast('Montant invalide.', 'error'); return; }
  const f = STATE.factures.find(x => x.id === m.factureId);
  const numero = generateNumero(STATE.caisse);
  fsSaveDoc('caisse', {
    id: uid(), numero, date: m.date, sens: 'ENC', nom: m.nom, compte: m.compte,
    designation: 'Règlement facture ' + (f ? f.numero : ''), montant: Number(m.montant), categorie: '', factureId: m.factureId,
  });
  STATE.encaisserModal = null;
  toast('Encaissement ' + numero + ' enregistré.', 'success');
  render();
}
function renderFacturesList() {
  const rows = STATE.factures.slice().sort((a, b) => (b.date + b.numero).localeCompare(a.date + a.numero));
  return `
  <div class="table-wrap"><table>
    <thead><tr><th>N°</th><th>Date</th><th>Client</th><th class="num">TTC</th><th class="num">Réglé</th><th>Échéance</th><th>Statut</th><th></th></tr></thead>
    <tbody>
    ${rows.length === 0 ? `<tr class="empty-row"><td colspan="8">Aucune facture pour le moment.</td></tr>` :
      rows.map(f => {
        const t = calcTotauxDoc(f); const paye = factureMontantPaye(f.id); const statut = factureStatut(f);
        const editableF = canEdit('factures');
        return `<tr>
          <td>${f.numero}</td>
          <td>${formatDate(f.date)}</td>
          <td>${escapeHtml(f.client.nom)}</td>
          <td class="num">${formatMoney(t.ttc)}</td>
          <td class="num">${formatMoney(paye)}</td>
          <td>${formatDate(f.echeance)}</td>
          <td><span class="badge ${statutBadgeClass(statut)}">${statut}</span></td>
          <td class="actions-cell">
            <button class="btn btn-sm btn-ghost" title="PDF" onclick="genererFacturePDF(STATE.factures.find(x=>x.id==='${f.id}'))">${ICONS.pdf}</button>
            ${statut !== 'Payée' && statut !== 'Annulée' && canEncaisser() ? `<button class="btn btn-sm btn-green" onclick="ouvrirEncaisser('${f.id}')">Encaisser</button>` : ''}

/* ==================== TRESORERIE ==================== */
function renderTresorerie() {
  const months = Array.from(new Set(STATE.caisse.map(p => p.date.slice(0, 7)))).sort().reverse();
  const curMonth = todayISO().slice(0, 7);
  if (!months.includes(curMonth)) months.unshift(curMonth);
  const selMonth = STATE.tresoMonth || curMonth;
  const selCompte = STATE.tresoCompte || '';

  const rowsComptes = STATE.comptes.map(c => {
    const s = moisSummary(c.id, selMonth);
    return `<tr>
      <td>${escapeHtml(c.nom)}</td><td>${escapeHtml(c.type || '')}</td>
      <td class="num">${formatMoney(s.soldeInitial)}</td>
      <td class="num" style="color:var(--green);">${formatMoney(s.enc)}</td>
      <td class="num" style="color:var(--red);">${formatMoney(s.dec)}</td>
      <td class="num" style="font-weight:700;">${formatMoney(s.soldeFinal)}</td>
    </tr>`;
  }).join('');
  const totals = STATE.comptes.reduce((acc, c) => {
    const s = moisSummary(c.id, selMonth);
    acc.si += s.soldeInitial; acc.enc += s.enc; acc.dec += s.dec; acc.sf += s.soldeFinal;
    return acc;
  }, { si: 0, enc: 0, dec: 0, sf: 0 });

  let journal = STATE.caisse.filter(p => p.date.slice(0, 7) === selMonth);
  if (selCompte) journal = journal.filter(p => p.compte === selCompte);
  journal = journal.sort((a, b) => (b.date + b.numero).localeCompare(a.date + a.numero));

  return `
  <div class="filters-bar">
    <div class="field"><label>Mois</label>
      <select onchange="STATE.tresoMonth=this.value;render()">
        ${months.map(m => `<option value="${m}" ${selMonth === m ? 'selected' : ''}>${m}</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>Compte (journal)</label>
      <select onchange="STATE.tresoCompte=this.value;render()">
        <option value="">Tous les comptes</option>
        ${STATE.comptes.map(c => `<option value="${c.id}" ${selCompte === c.id ? 'selected' : ''}>${escapeHtml(c.nom)}</option>`).join('')}
      </select>
    </div>
    <button class="btn btn-primary" onclick="genererEtatTresoreriePDF('${selMonth}')">${ICONS.pdf} État PDF du mois</button>
    <button class="btn" onclick="genererEtatTresoreriePDF(null)">${ICONS.pdf} État PDF global</button>
    ${canEdit('transferts') ? `<button class="btn btn-yellow" onclick="ouvrirTransfert()">${ICONS.plus} Nouveau virement</button>` : ''}
  </div>

  <div class="section-title">Situation par compte — ${selMonth}</div>
  <div class="table-wrap"><table>
    <thead><tr><th>Compte</th><th>Type</th><th class="num">Solde initial</th><th class="num">Encaissements</th><th class="num">Décaissements</th><th class="num">Solde final</th></tr></thead>
    <tbody>
      ${rowsComptes}
      <tr style="background:var(--blue-light);font-weight:700;">
        <td colspan="2">TOTAL</td>
        <td class="num">${formatMoney(totals.si)}</td>
        <td class="num" style="color:var(--green);">${formatMoney(totals.enc)}</td>
        <td class="num" style="color:var(--red);">${formatMoney(totals.dec)}</td>
        <td class="num">${formatMoney(totals.sf)}</td>
      </tr>
    </tbody>
  </table></div>

  <div class="section-title">Journal de trésorerie — ${selMonth}</div>
  <div class="table-wrap"><table>
    <thead><tr><th>Date</th><th>N°</th><th>Sens</th><th>Tiers</th><th>Désignation</th><th>Compte</th><th class="num">Encaiss.</th><th class="num">Décaiss.</th></tr></thead>
    <tbody>
    ${journal.length === 0 ? `<tr class="empty-row"><td colspan="8">Aucune opération sur cette période.</td></tr>` :
      journal.map(p => `<tr>
        <td>${formatDate(p.date)}</td><td>${p.numero}</td>
        <td><span class="badge ${p.sens === 'ENC' ? 'badge-green' : 'badge-red'}">${p.sens === 'ENC' ? 'Enc.' : 'Déc.'}</span></td>
        <td>${escapeHtml(p.nom)}</td><td>${escapeHtml(p.designation || '—')}</td>
        <td>${escapeHtml((STATE.comptes.find(c => c.id === p.compte) || {}).nom || '—')}</td>
        <td class="num">${p.sens === 'ENC' ? formatMoney(p.montant) : ''}</td>
        <td class="num">${p.sens === 'DEC' ? formatMoney(p.montant) : ''}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

/* ==================== VIREMENTS (compte à compte / caisse à caisse) ==================== */
function ouvrirTransfert() {
  if (STATE.comptes.length < 2) { toast('Il faut au moins deux comptes pour effectuer un virement.', 'error'); return; }
  STATE.transfertModal = {
    date: todayISO(),
    source: STATE.comptes[0].id,
    destination: STATE.comptes[1].id,
    montant: 0,
    motif: '',
  };
  render();
}
function closeTransfert() { STATE.transfertModal = null; render(); }
function confirmerTransfert() {
  const m = STATE.transfertModal;
  if (m.source === m.destination) { toast('Le compte source et le compte de destination doivent être différents.', 'error'); return; }
  if (!m.montant || Number(m.montant) <= 0) { toast('Montant invalide.', 'error'); return; }
  const src = STATE.comptes.find(c => c.id === m.source);
  const dst = STATE.comptes.find(c => c.id === m.destination);
  const transfertId = uid();
  const suffixe = m.motif ? ' — ' + m.motif : '';
  const numero1 = generateNumero(STATE.caisse);
  fsSaveDoc('caisse', {
    id: uid(), numero: numero1, date: m.date, sens: 'DEC', compte: m.source,
    nom: 'Virement interne', designation: 'Virement vers ' + dst.nom + suffixe,
    montant: Number(m.montant), categorie: 'Transfert interne', transfertId,
  });
  const numero2 = generateNumero([...STATE.caisse, { numero: numero1 }]);
  fsSaveDoc('caisse', {
    id: uid(), numero: numero2, date: m.date, sens: 'ENC', compte: m.destination,
    nom: 'Virement interne', designation: 'Virement depuis ' + src.nom + suffixe,
    montant: Number(m.montant), categorie: 'Transfert interne', transfertId,
  });
  STATE.transfertModal = null;
  toast('Virement de ' + formatMoney(m.montant) + ' : ' + src.nom + ' → ' + dst.nom, 'success');
  render();
}

        <div class="field"><label>RCCM</label><input value="${escapeHtml(p.rccm)}" oninput="STATE.params.rccm=this.value"/></div>
        <div class="field"><label>NIF</label><input value="${escapeHtml(p.nif)}" oninput="STATE.params.nif=this.value"/></div>
        <div class="field"><label>Durée d'archivage (années)</label><input type="number" value="${p.dureeArchivage}" oninput="STATE.params.dureeArchivage=Number(this.value)"/></div>
      </div>
    </div>
    <div class="form-section">
      <h3>Taux fiscaux</h3>
      <div class="form-grid cols-3">
        <div class="field"><label>Taux TPS (%)</label><input type="number" step="0.1" value="${p.tauxTPS}" oninput="STATE.params.tauxTPS=Number(this.value)"/></div>
        <div class="field"><label>Taux CSS (%)</label><input type="number" step="0.1" value="${p.tauxCSS}" oninput="STATE.params.tauxCSS=Number(this.value)"/></div>
      </div>
      <p class="help-text">Ces taux s'appliquent automatiquement au calcul de tous les nouveaux devis et factures.</p>
    </div>
    <div class="form-actions"><button class="btn btn-primary" onclick="saveParams()">Enregistrer les paramètres</button></div>
  </div>

  <div class="form-card">
    <div class="form-section">
      <h3>Comptes de trésorerie</h3>
      <div class="table-wrap" style="margin-bottom:16px;"><table>
        <thead><tr><th>Nom</th><th>Type</th><th class="num">Solde initial</th><th></th></tr></thead>
        <tbody>
        ${STATE.comptes.map(c => `<tr>
          <td>${escapeHtml(c.nom)}</td><td>${escapeHtml(c.type || '')}</td>
          <td class="num"><input type="number" style="width:140px;text-align:right;" value="${c.soldeInitial}" onchange="updateCompteSolde('${c.id}', this.value)"/></td>
          <td class="actions-cell"><button class="btn btn-sm btn-ghost" title="Supprimer" onclick="deleteCompte('${c.id}')">${ICONS.trash}</button></td>
        </tr>`).join('')}
        </tbody>
      </table></div>
      <div class="form-grid cols-4">
        <div class="field"><label>Nouveau compte — nom</label><input id="new-compte-nom" placeholder="Ex : Banque BGFI"/></div>
        <div class="field"><label>Type</label><input id="new-compte-type" placeholder="Ex : Banque, Mobile Money…"/></div>
        <div class="field"><label>Solde initial</label><input id="new-compte-solde" type="number" value="0"/></div>
        <div class="field" style="align-self:flex-end;"><button class="btn btn-green" style="width:100%;" onclick="addCompte()">${ICONS.plus} Ajouter</button></div>
      </div>
    </div>
  </div>`;
}

/* ==================== UTILISATEURS ==================== */
function newUtilisateurForm() {
  STATE.formDraft = { id: uid(), _isNew: true, nom: '', email: '', motDePasse: '', role: 'Commercial', actif: true };
  navigate('utilisateur-form');
}
function editUtilisateurForm(id) {
  const u = STATE.users.find(x => x.id === id);
  if (!u) return;
  STATE.formDraft = JSON.parse(JSON.stringify(u));
  STATE.formDraft._isNew = false;
  navigate('utilisateur-form');
}
function saveUtilisateur() {
  const u = STATE.formDraft;
  if (!u.nom.trim() || !u.email.trim()) { toast('Le nom et l\'adresse e-mail sont obligatoires.', 'error'); return; }
  if (u._isNew) {
    if (!u.motDePasse || u.motDePasse.length < 6) { toast('Le mot de passe doit contenir au moins 6 caractères.', 'error'); return; }
    secondaryAuth.createUserWithEmailAndPassword(u.email.trim(), u.motDePasse).then(cred => {
      const profil = { id: cred.user.uid, nom: u.nom, email: u.email.trim(), role: u.role, actif: u.actif !== false };
      return fsSaveDoc('users', profil).then(() => secondaryAuth.signOut());
    }).then(() => {
      toast('Utilisateur créé. Communiquez-lui son e-mail et son mot de passe initial.', 'success');
      navigate('utilisateurs');
    }).catch(e => toast(translateFirebaseError(e), 'error'));
  } else {
    const clean = JSON.parse(JSON.stringify(u)); delete clean._isNew; delete clean.motDePasse;
    fsSaveDoc('users', clean);
    toast('Utilisateur mis à jour.', 'success');
    navigate('utilisateurs');
  }
}
function envoyerResetPassword(email) {
  auth.sendPasswordResetEmail(email)
    .then(() => toast('E-mail de réinitialisation envoyé à ' + email + '.', 'success'))
    .catch(e => toast(translateFirebaseError(e), 'error'));
}
function toggleUtilisateurActif(id) {
  const u = STATE.users.find(x => x.id === id);
  if (!u) return;
  const adminsActifs = STATE.users.filter(x => x.role === 'Administrateur' && x.actif !== false);
  if (u.role === 'Administrateur' && u.actif !== false && adminsActifs.length <= 1) {
    toast('Impossible de désactiver le dernier administrateur actif.', 'error'); return;
  }
  const clean = JSON.parse(JSON.stringify(u));
  clean.actif = u.actif === false ? true : false;
  fsSaveDoc('users', clean);
  render();
}
function deleteUtilisateur(id) {
  const u = STATE.users.find(x => x.id === id);
  if (!u) return;
  const adminsActifs = STATE.users.filter(x => x.role === 'Administrateur' && x.actif !== false);
  if (u.role === 'Administrateur' && adminsActifs.length <= 1) {
    toast('Impossible de supprimer le dernier administrateur.', 'error'); return;
  }
  if (STATE.currentUser && STATE.currentUser.id === id) {
    toast('Vous ne pouvez pas supprimer votre propre compte pendant que vous êtes connecté.', 'error'); return;
  }
  askConfirm('Supprimer cet utilisateur ?', escapeHtml(u.nom) + ' (' + u.email + ') perdra immédiatement l\'accès au logiciel. Son compte de connexion devra être supprimé séparément dans la console Firebase si besoin.', () => {
    fsDeleteDoc('users', id); STATE.confirmModal = null; toast('Utilisateur supprimé.', 'success'); render();
  });
}
function renderUtilisateurs() {
  const rows = STATE.users.slice().sort((a, b) => a.nom.localeCompare(b.nom));
  return `
  <div class="grid grid-4" style="margin-bottom:20px;">
    ${ROLES.map(r => `
      <div class="card">
        <div style="font-weight:700;color:var(--blue-dark);font-size:13px;">${r}</div>
        <div class="help-text" style="margin-top:4px;">${ROLE_DESCRIPTIONS[r]}</div>
      </div>`).join('')}
  </div>
  <div class="table-wrap"><table>
    <thead><tr><th>Nom</th><th>E-mail</th><th>Rôle</th><th>Statut</th><th></th></tr></thead>
    <tbody>
    ${rows.length === 0 ? `<tr class="empty-row"><td colspan="5">Aucun utilisateur.</td></tr>` :
      rows.map(u => `<tr>
        <td>${escapeHtml(u.nom)}</td>
        <td>${escapeHtml(u.email)}</td>
        <td><span class="badge badge-blue">${u.role}</span></td>
        <td><span class="badge ${u.actif === false ? 'badge-grey' : 'badge-green'}">${u.actif === false ? 'Inactif' : 'Actif'}</span></td>
        <td class="actions-cell">
          <button class="btn btn-sm btn-ghost" title="Envoyer un lien de réinitialisation" onclick="envoyerResetPassword('${u.email}')">🔑</button>
          <button class="btn btn-sm btn-ghost" title="${u.actif === false ? 'Activer' : 'Désactiver'}" onclick="toggleUtilisateurActif('${u.id}')">${u.actif === false ? '✓' : '⏻'}</button>
          <button class="btn btn-sm btn-ghost" title="Modifier" onclick="editUtilisateurForm('${u.id}')">${ICONS.edit}</button>
          <button class="btn btn-sm btn-ghost" title="Supprimer" onclick="deleteUtilisateur('${u.id}')">${ICONS.trash}</button>
        </td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}
function renderUtilisateurForm() {
  const u = STATE.formDraft;
  return `
  <div class="form-card">
    <div class="form-section">
      <h3>Identité et accès</h3>
      <div class="form-grid cols-3">
        <div class="field"><label>Nom complet</label><input value="${escapeHtml(u.nom)}" oninput="STATE.formDraft.nom=this.value"/></div>
        <div class="field"><label>Adresse e-mail</label><input type="email" value="${escapeHtml(u.email)}" ${u._isNew ? '' : 'disabled'} oninput="STATE.formDraft.email=this.value"/></div>
        ${u._isNew ? `<div class="field"><label>Mot de passe initial</label><input type="password" oninput="STATE.formDraft.motDePasse=this.value" placeholder="6 caractères minimum"/></div>` : '<div></div>'}
      </div>
      <div class="form-grid cols-3" style="margin-top:14px;">
        <div class="field"><label>Rôle</label>
          <select onchange="STATE.formDraft.role=this.value">
            ${ROLES.map(r => `<option value="${r}" ${u.role === r ? 'selected' : ''}>${r}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Statut</label>
          <select onchange="STATE.formDraft.actif=(this.value==='actif')">
            <option value="actif" ${u.actif !== false ? 'selected' : ''}>Actif</option>
            <option value="inactif" ${u.actif === false ? 'selected' : ''}>Inactif</option>
          </select>
        </div>
      </div>
      <p class="help-text">${ROLE_DESCRIPTIONS[u.role] || ''}${u._isNew ? '' : ' — Pour changer le mot de passe, utilisez le bouton 🔑 « Envoyer un lien de réinitialisation » depuis la liste.'}</p>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="navigate('utilisateurs')">Annuler</button>
      <button class="btn btn-primary" onclick="saveUtilisateur()">Enregistrer</button>
    </div>
  </div>`;
}

/* ==================== MODALS ==================== */
function closeConfirm() { STATE.confirmModal = null; render(); }
function closeEncaisser() { STATE.encaisserModal = null; render(); }
function renderModals() {
  const root = document.getElementById('modal-root');
  let html = '';
  if (STATE.confirmModal) {
    const m = STATE.confirmModal;
    window.__confirmYes = m.onYes;
    html += `<div class="modal-overlay"><div class="modal-box">
      <h3>${escapeHtml(m.title)}</h3><p>${escapeHtml(m.text)}</p>
      <div class="modal-actions"><button class="btn" onclick="closeConfirm()">Annuler</button><button class="btn btn-danger" onclick="window.__confirmYes()">Confirmer</button></div>
    </div></div>`;
  }
  if (STATE.encaisserModal) {
    const m = STATE.encaisserModal;
    const f = STATE.factures.find(x => x.id === m.factureId);
    const t = f ? calcTotauxDoc(f) : { ttc: 0 };
    html += `<div class="modal-overlay"><div class="modal-box">
      <h3>Encaisser la facture ${f ? f.numero : ''}</h3>
      <p>Montant total TTC : <b>${formatMoney(t.ttc)}</b> — Déjà réglé : <b>${formatMoney(factureMontantPaye(m.factureId))}</b></p>
      <div class="form-grid cols-2" style="margin-bottom:16px;">
        <div class="field"><label>Date</label><input type="date" value="${m.date}" onchange="STATE.encaisserModal.date=this.value"/></div>
        <div class="field"><label>Montant reçu</label><input type="number" value="${m.montant}" oninput="STATE.encaisserModal.montant=Number(this.value)"/></div>
        <div class="field"><label>Compte crédité</label>
          <select onchange="STATE.encaisserModal.compte=this.value">
            ${STATE.comptes.map(c => `<option value="${c.id}" ${m.compte === c.id ? 'selected' : ''}>${escapeHtml(c.nom)}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Nom du client</label><input value="${escapeHtml(m.nom)}" oninput="STATE.encaisserModal.nom=this.value"/></div>
      </div>
      <div class="modal-actions"><button class="btn" onclick="closeEncaisser()">Annuler</button><button class="btn btn-green" onclick="confirmerEncaisser()">Valider l'encaissement</button></div>
    </div></div>`;
  }
  if (STATE.transfertModal) {
    const m = STATE.transfertModal;
    html += `<div class="modal-overlay"><div class="modal-box">
      <h3>Nouveau virement interne</h3>
      <p>Transfert entre deux comptes ou caisses (ex. Caisse physique → Banque UBA, ou entre deux caisses).</p>
      <div class="form-grid cols-2" style="margin-bottom:16px;">
        <div class="field"><label>Date</label><input type="date" value="${m.date}" onchange="STATE.transfertModal.date=this.value"/></div>
        <div class="field"><label>Montant</label><input type="number" min="0" value="${m.montant}" oninput="STATE.transfertModal.montant=Number(this.value)"/></div>
        <div class="field"><label>Compte source (débité)</label>
          <select onchange="STATE.transfertModal.source=this.value">
            ${STATE.comptes.map(c => `<option value="${c.id}" ${m.source === c.id ? 'selected' : ''}>${escapeHtml(c.nom)}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Compte destination (crédité)</label>
          <select onchange="STATE.transfertModal.destination=this.value">
            ${STATE.comptes.map(c => `<option value="${c.id}" ${m.destination === c.id ? 'selected' : ''}>${escapeHtml(c.nom)}</option>`).join('')}
          </select>
        </div>
        <div class="field" style="grid-column:span 2;"><label>Motif (optionnel)</label><input value="${escapeHtml(m.motif)}" oninput="STATE.transfertModal.motif=this.value" placeholder="Ex : Approvisionnement caisse agence"/></div>
      </div>
      <p class="help-text">Solde actuel du compte source : ${formatMoney(compteSoldeActuel(m.source))}</p>
      <div class="modal-actions"><button class="btn" onclick="closeTransfert()">Annuler</button><button class="btn btn-yellow" onclick="confirmerTransfert()">Valider le virement</button></div>
    </div></div>`;
  }
  root.innerHTML = html;
}

/* ==================== STATUT DE SYNCHRONISATION ==================== */
function syncStatusHTML() {
  if (!STATE.currentUser) return '';
  return `<span class="badge badge-green" style="align-self:center;padding:6px 12px;">● Synchronisé en temps réel</span>`;
}

/* ==================== INIT ==================== */
function initApp() {
  if (!firebaseReady()) { render(); return; }
  initFirebase();
  render();
}
document.addEventListener('DOMContentLoaded', initApp);

</script>
</body>
</html>
